query findPage(
   $filters: PageFiltersInput
   $publicationState: PublicationState
   $pagination: PaginationArg
) {
   pages(
      filters: $filters
      publicationState: $publicationState
      pagination: $pagination
   ) {
      data {
         id
         attributes {
            path
            title
            sections {
               __typename
               ... on ComponentPageHero {
                  id
                  title
                  description
                  callToAction {
                     ...CallToActionFragment
                  }
                  image {
                     ...ImageFragment
                  }
               }
               ... on ComponentPageBrowse {
                  id
                  title
                  description
                  featuredProductLists {
                     data {
                        attributes {
                           handle
                           title
                           image {
                              ...ImageFragment
                           }
                        }
                     }
                  }
                  image {
                     ...ImageFragment
                  }
               }
               ... on ComponentPageWorkbench {
                  id
                  title
               }
               ... on ComponentPageStats {
                  id
                  title
                  stats {
                     id
                     label
                     value
                  }
               }
               ... on ComponentPageSplitWithImage {
                  id
                  title
                  description
                  callToAction {
                     ...CallToActionFragment
                  }
                  imagePosition
                  image {
                     ...ImageFragment
                  }
               }
               ... on ComponentPagePress {
                  id
                  title
                  description
                  callToAction {
                     ...CallToActionFragment
                  }
                  pressQuotes {
                     id
                     name
                     text
                     logo {
                        ...ImageFragment
                     }
                  }
               }
               ... on ComponentPageFeaturedProductList {
                  id
                  title
                  description
                  productList {
                     data {
                        attributes {
                           title
                           handle
                           deviceTitle
                        }
                     }
                  }
               }
               ... on ComponentPageSocialGallery {
                  id
                  title
                  description
                  posts {
                     id
                     author
                     url
                     image {
                        ...ImageFragment
                     }
                  }
               }
               ... on ComponentPageBanner {
                  id
                  banner {
                     data {
                        attributes {
                           template
                           title
                           description
                           callToAction {
                              ...CallToActionFragment
                           }
                           image {
                              ...ImageFragment
                           }
                        }
                     }
                  }
               }
               ... on ComponentPageQuotes {
                  id
                  title
                  description
                  quotes {
                     id
                     text
                     author
                     headline
                     avatar {
                        ...ImageFragment
                     }
                  }
               }
            }
         }
      }
   }
}

fragment ImageFragment on UploadFileEntityResponse {
   data {
      attributes {
         alternativeText
         url
         formats
      }
   }
}

fragment CallToActionFragment on ComponentPageCallToAction {
   title
   url
}
